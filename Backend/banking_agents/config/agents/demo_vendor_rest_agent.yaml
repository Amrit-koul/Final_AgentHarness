agent_id: demo_vendor_rest_agent
name: Demo Vendor REST Agent
owner: Platform / Vendor Integration
business_function: External Agent Integration
agent_type: external
execution_mode: synchronous
adapter_type: rest_api
endpoint: http://127.0.0.1:9001/invoke
description: >
  Demo/test REST adapter contract. Illustrates how an independently hosted third-party agent
  plugs into the harness via an adapter boundary: the harness applies policy checks, guardrails,
  lifecycle status, and audit tracing before and after the HTTP call. The vendor endpoint is a
  local mock service (127.0.0.1:9001) included for demo purposes only — not a production integration.
input_schema:
  type: object
  required: [query]
  properties:
    query: {type: string}
output_schema:
  type: object
  required: [answer, confidence, vendor, trace_id]
  properties:
    answer: {type: string}
    confidence: {type: number}
    vendor: {type: string}
    trace_id: {type: string}
state_schema: {type: object}
memory_schema: {type: object}
skills: [external_agent_invocation, vendor_response_normalization]
tools: [external_api_call]
prompts: []
model_preferences: {}
policy_permissions:
  allowed_tools: [external_api_call]
  allowed_actions: [invoke]
  allowed_data_scopes: [external_agent_requests]
  requires_human_approval_for: []
guardrails: [pii_leakage, unsafe_sql, prompt_injection, business_scope]
observability_hooks: {execution_trace: true, policy_decision: true, audit: true, usage_cost: true}
metadata:
  demo: true
  demo_notes: >
    Local mock vendor service at 127.0.0.1:9001 must be running for invocation.
    This contract exists to demonstrate the REST adapter boundary and harness governance
    path, not to represent a real vendor integration.
  timeout_seconds: 5
  retry:
    max_attempts: 1
  # Empty means this demo endpoint has no bearer token. Set an env-var name for authenticated vendors.
  auth_env_var: ""
status: active