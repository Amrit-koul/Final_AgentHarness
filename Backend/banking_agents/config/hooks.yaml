    payload_schema: {type: object, required: [trace_id, agent_id]}
    subscribers: [observability_audit]
    enabled: true
    owner: Agent Platform
    risk_tier: medium
    audit_required: true
  on_trace_emit: {name: Trace emission audit, trigger_point: on_trace_emit, description: Contract point for trace emission., payload_schema: {type: object}, subscribers: [observability_audit], enabled: true, owner: Agent Platform, risk_tier: low, audit_required: false}
  on_evaluation_record: {name: Evaluation audit, trigger_point: on_evaluation_record, description: Contract point for persisted evaluator output., payload_schema: {type: object}, subscribers: [observability_audit], enabled: true, owner: AI Quality, risk_tier: medium, audit_required: true}
