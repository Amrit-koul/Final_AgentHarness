    payload_schema: {type: object, required: [trace_id, agent_id]}
    subscribers: [observability_audit]
    enabled: true
    owner: Risk Engineering
    risk_tier: high
    audit_required: true
  on_kill_switch: {name: Kill switch audit, trigger_point: on_kill_switch, description: Contract point for kill-switch changes., payload_schema: {type: object}, subscribers: [observability_audit], enabled: true, owner: Risk Engineering, risk_tier: critical, audit_required: true}
  on_degradation: {name: Degradation audit, trigger_point: on_degradation, description: Contract point for degradation events., payload_schema: {type: object}, subscribers: [observability_audit], enabled: true, owner: Agent Platform, risk_tier: high, audit_required: true}
  cost_recorded:
